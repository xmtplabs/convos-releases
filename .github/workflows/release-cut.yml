# Weekly release-branch cut for convos-ios + convos-client. Durable state is
# releases/<version>/manifest.yml (committed first); every step is
# ensure-state, so re-dispatching converges. All logic lives in Train::Cut;
# this only plumbs credentials and the trigger context.
name: Release Cut

# The weekly trigger is the cut-cron Cloudflare Worker (workers/cut-cron):
# GitHub's own schedule trigger lags 15-25 minutes, and keeping it alongside
# the worker risks cutting a second train after dev's version bump. The
# worker dispatches with the `schedule` input set to the slot string.
on:
  workflow_dispatch:
    inputs:
      schedule:
        description: "Slot string for a scheduled fire (set by cut-cron; leave empty for manual runs)"
        type: string
        default: ""
      force:
        description: Bypass day/skip checks
        type: boolean
        default: false
      dry-run:
        description: Print the plan, mutate nothing
        type: boolean
        default: false
      hotfix-base-tag:
        description: "Cut a hotfix from this tag instead (vX.Y.Z); leave empty for a normal cut"
        type: string
        default: ""
      hotfix-repo:
        description: "optional single repo OWNER/NAME for a one-platform hotfix"
        type: string
        default: ""

concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  cut:
    runs-on: warp-ubuntu-latest-x64-8x
    timeout-minutes: 20
    permissions:
      contents: read    # pushes use the bot token, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v6
        with:
          # The default persisted GITHUB_TOKEN auth header overrides the
          # bot-token push URL — pushes would authenticate as
          # github-actions[bot], which the main ruleset does not bypass.
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Mint bot token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases,convos-ios,convos-client

      # A non-empty hotfix-base-tag switches this step to `train hotfix`
      # instead of `train cut` (hotfix is dispatch-only, no force flag).
      # A real cut announces itself in Slack (Train::Notify) — best-effort,
      # and skipped with a note when SLACK_WEBHOOK_URL is unset.
      - name: Cut
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_APP }}
          TRAIN_SCHEDULE: ${{ inputs.schedule || '' }}
          TRAIN_FORCE: ${{ inputs.force || 'false' }}
          TRAIN_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          TRAIN_HOTFIX_BASE_TAG: ${{ inputs.hotfix-base-tag || '' }}
          TRAIN_HOTFIX_REPO: ${{ inputs.hotfix-repo || '' }}
        run: |
          if [ -n "$TRAIN_HOTFIX_BASE_TAG" ]; then
            args=(hotfix --base-tag "$TRAIN_HOTFIX_BASE_TAG")
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
            [ -n "$TRAIN_HOTFIX_REPO" ] && args+=(--repo "$TRAIN_HOTFIX_REPO")
          else
            args=(cut)
            [ -n "$TRAIN_SCHEDULE" ] && args+=(--schedule "$TRAIN_SCHEDULE")
            [ "$TRAIN_FORCE" = "true" ] && args+=(--force)
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
          fi
          nix develop --command train "${args[@]}"
