# Weekly release-branch cut for convos-ios + convos-client.
#
# Durable state = releases/<version>/manifest.yml (committed FIRST); every
# step is ensure-state, so re-dispatching after any failure converges. All
# cut logic lives in bin/train (Train::Cut) — this workflow only plumbs
# credentials and the trigger context.
name: Release Cut

on:
  schedule:
    # Both correspond to 15:45 America/New_York across DST; the slot
    # decision step keeps exactly one.
    - cron: "45 19 * * *"
    - cron: "45 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Bypass day/skip checks
        type: boolean
        default: false
      dry-run:
        description: Print the plan, mutate nothing
        type: boolean
        default: false
      hotfix-base-tag:
        description: "Cut a hotfix from this tag instead (vX.Y.Z); leave empty for a normal cut"
        type: string
        default: ""

concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  cut:
    runs-on: warp-ubuntu-latest-x64-8x
    timeout-minutes: 20
    permissions:
      contents: read    # pushes use the bot token, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v6
        with:
          # The default persisted GITHUB_TOKEN auth header overrides the
          # bot-token push URL — pushes would authenticate as
          # github-actions[bot], which the main ruleset does not bypass.
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Mint bot token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases,convos-ios,convos-client

      # All cut logic (slot/day/skip decision, in-flight recovery, capture,
      # manifest-first, branch/PR ensure-state) lives in the tested `train`
      # CLI — this workflow only plumbs credentials and the trigger context.
      # A non-empty hotfix-base-tag switches this step to `train hotfix`
      # instead of `train cut` — hotfix has no force flag (dispatch-only, no
      # slot/day/skip decision to bypass).
      - name: Cut
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          TRAIN_SCHEDULE: ${{ github.event.schedule }}
          TRAIN_FORCE: ${{ inputs.force || 'false' }}
          TRAIN_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          TRAIN_HOTFIX_BASE_TAG: ${{ inputs.hotfix-base-tag || '' }}
        run: |
          if [ -n "$TRAIN_HOTFIX_BASE_TAG" ]; then
            args=(hotfix --base-tag "$TRAIN_HOTFIX_BASE_TAG")
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
          else
            args=(cut)
            [ -n "$TRAIN_SCHEDULE" ] && args+=(--schedule "$TRAIN_SCHEDULE")
            [ "$TRAIN_FORCE" = "true" ] && args+=(--force)
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
          fi
          nix develop --command train "${args[@]}"
