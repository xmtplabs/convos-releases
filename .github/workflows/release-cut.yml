# Weekly release-branch cut for convos-ios + convos-client. Durable state is
# releases/<version>/manifest.yml (committed first); every step is
# ensure-state, so re-dispatching converges. All logic lives in Train::Cut;
# this only plumbs credentials and the trigger context.
name: Release Cut

on:
  schedule:
    # Both correspond to 15:45 America/New_York across DST; the slot
    # decision step keeps exactly one.
    - cron: "45 19 * * *"
    - cron: "45 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Bypass day/skip checks
        type: boolean
        default: false
      dry-run:
        description: Print the plan, mutate nothing
        type: boolean
        default: false
      hotfix-base-tag:
        description: "Cut a hotfix from this tag instead (vX.Y.Z); leave empty for a normal cut"
        type: string
        default: ""
      hotfix-repo:
        description: "optional single repo OWNER/NAME for a one-platform hotfix"
        type: string
        default: ""

concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  cut:
    runs-on: warp-ubuntu-latest-x64-8x
    timeout-minutes: 20
    permissions:
      contents: read    # pushes use the bot token, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v6
        with:
          # The default persisted GITHUB_TOKEN auth header overrides the
          # bot-token push URL — pushes would authenticate as
          # github-actions[bot], which the main ruleset does not bypass.
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Mint bot token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases,convos-ios,convos-client

      # A non-empty hotfix-base-tag switches this step to `train hotfix`
      # instead of `train cut` (hotfix is dispatch-only, no force flag).
      # A real cut emits cut-version/cut-kind step outputs (dry-run and
      # skipped days emit nothing).
      - name: Cut
        id: cut
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          TRAIN_SCHEDULE: ${{ github.event.schedule }}
          TRAIN_FORCE: ${{ inputs.force || 'false' }}
          TRAIN_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          TRAIN_HOTFIX_BASE_TAG: ${{ inputs.hotfix-base-tag || '' }}
          TRAIN_HOTFIX_REPO: ${{ inputs.hotfix-repo || '' }}
        run: |
          if [ -n "$TRAIN_HOTFIX_BASE_TAG" ]; then
            args=(hotfix --base-tag "$TRAIN_HOTFIX_BASE_TAG")
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
            [ -n "$TRAIN_HOTFIX_REPO" ] && args+=(--repo "$TRAIN_HOTFIX_REPO")
          else
            args=(cut)
            [ -n "$TRAIN_SCHEDULE" ] && args+=(--schedule "$TRAIN_SCHEDULE")
            [ "$TRAIN_FORCE" = "true" ] && args+=(--force)
            [ "$TRAIN_DRY_RUN" = "true" ] && args+=(--dry-run)
          fi
          nix develop --command train "${args[@]}"

      # Best-effort: a missing webhook or Slack outage must never fail (or
      # re-run) a completed cut.
      - name: Notify Slack
        if: steps.cut.outputs.cut-version != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_APP }}
          VERSION: ${{ steps.cut.outputs.cut-version }}
          KIND: ${{ steps.cut.outputs.cut-kind }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_APP secret not set — skipping Slack notification"
            exit 0
          fi
          payload=$(jq -n --arg v "$VERSION" --arg k "$KIND" '{
            text: ("🚂 *\($k) \($v) cut* — release branches are open; every push uploads an RC.\n• <https://github.com/xmtplabs/convos-releases/tree/main/releases/\($v)|Release notes \($v)> — pencil-edit before merging\n• <https://github.com/xmtplabs/convos-releases/blob/main/RUNBOOK.md|Runbook>\nWhen QA passes, comment `@convos-conductor merge` on a release PR.")
          }')
          curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification failed"
