# Reusable: build convos-client prodRelease AAB and upload to the Play Store
# internal testing track. Runs on the CALLER's checkout. Prod signing + Play
# credentials come from the caller's `play-prod` environment, not repo-level
# secrets; only CACHIX_AUTH_TOKEN arrives via `secrets: inherit`. versionCode
# is computed by the lane (commit epoch / 60).
name: Android Play Internal (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label for the build job
        type: string
        default: blacksmith-8vcpu-ubuntu-2404
      project-dir:
        description: Directory containing the gradle root (and fastlane/ stub)
        type: string
        default: android
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

jobs:
  build:
    name: Build & upload to Play internal track
    runs-on: ${{ inputs.runner }}
    # Serialize Play mutations at the job itself. Queue, never cancel.
    concurrency:
      group: play-internal-${{ github.repository }}
      cancel-in-progress: false
    # Resolves the CALLER's play-prod environment: its secrets and
    # deployment-branch policy (release/hotfix; dev moved to Firebase) apply.
    environment: play-prod
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Nix
        # Qualified ref: reusable workflows check out the CALLER's repo.
        # sticky-disk gates on the label so non-Blacksmith callers are
        # unaffected.
        uses: xmtplabs/convos-releases/.github/actions/setup-nix@main
        with:
          sticky-disk: ${{ startsWith(inputs.runner, 'blacksmith') }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Mount gradle cache sticky disk
        if: startsWith(inputs.runner, 'blacksmith')
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-gradle
          path: /home/runner/.gradle

      - name: Own gradle cache
        if: startsWith(inputs.runner, 'blacksmith')
        run: sudo chown "$(id -u):$(id -g)" /home/runner/.gradle

      - name: Enter dev shell
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "--accept-flake-config"

      - name: Decode prod keystore + Play service account
        env:
          PROD_KEYSTORE_B64: ${{ secrets.PROD_KEYSTORE_BASE64 }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_PASSWORD }}
          PROD_KEY_ALIAS: ${{ secrets.PROD_KEY_ALIAS }}
          PROD_KEY_PASSWORD: ${{ secrets.PROD_KEY_PASSWORD }}
          PLAY_SA_B64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        # Secret values never reach the log (stdout redirected, no command
        # echo, Actions masking); printf avoids echo's escape processing.
        # Guard EVERY secret: a missing one fails minutes later with a cryptic
        # gradle error, and an empty PROD_KEY_ALIAS silently overrides gradle's default.
        run: |
          [ -n "$PROD_KEYSTORE_B64" ] || { echo "::error::PROD_KEYSTORE_BASE64 secret is missing (check the play-prod environment)"; exit 1; }
          [ -n "$PROD_KEYSTORE_PASSWORD" ] || { echo "::error::PROD_KEYSTORE_PASSWORD secret is missing (check the play-prod environment)"; exit 1; }
          [ -n "$PROD_KEY_ALIAS" ] || { echo "::error::PROD_KEY_ALIAS secret is missing (check the play-prod environment)"; exit 1; }
          [ -n "$PROD_KEY_PASSWORD" ] || { echo "::error::PROD_KEY_PASSWORD secret is missing (check the play-prod environment)"; exit 1; }
          [ -n "$PLAY_SA_B64" ] || { echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is missing (check the play-prod environment)"; exit 1; }
          printf '%s' "$PROD_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/prod-upload.jks"
          printf '%s' "$PLAY_SA_B64" | base64 -d > "$RUNNER_TEMP/play-sa.json"

      - name: Run fastlane android play_internal
        id: fastlane
        working-directory: ${{ inputs.project-dir }}
        env:
          # Absolute path: gradle's file() resolves relative paths against
          # the app module dir, not the gradle root.
          PROD_KEYSTORE_PATH: ${{ runner.temp }}/prod-upload.jks
          PROD_KEYSTORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_PASSWORD }}
          PROD_KEY_ALIAS: ${{ secrets.PROD_KEY_ALIAS }}
          PROD_KEY_PASSWORD: ${{ secrets.PROD_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play-sa.json
        run: fastlane android play_internal

      - name: Clean up decoded secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/prod-upload.jks" "$RUNNER_TEMP/play-sa.json"

      # Debugging convenience only. warn + continue-on-error ensure this never
      # fails the job after a successful Play upload — that would poison the
      # next slot's freshness check into retrying a used versionCode.
      - name: Upload AAB artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: convos-android-play-internal-${{ github.run_id }}
          path: ${{ inputs.project-dir }}/app/build/outputs/bundle/prodRelease/*.aab
          if-no-files-found: warn
          retention-days: 14

      # Record this RC (release/hotfix only). The always() + fastlane.outcome
      # guards record even if a later step fails, but never if the upload didn't.
      - name: Record RC in train manifest
        if: always() && steps.fastlane.outcome == 'success' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))
        uses: actions/create-github-app-token@v1
        id: bot
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases
      - name: Append manifest entry
        if: always() && steps.fastlane.outcome == 'success' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          VERSION_CODE: ${{ steps.fastlane.outputs.version-code }}
        run: |
          nix run github:xmtplabs/convos-releases#train --option access-tokens "github.com=$GH_TOKEN" -- append-rc \
            --repo "$GITHUB_REPOSITORY" --sha "$GITHUB_SHA" \
            --run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --key version-code --value "${VERSION_CODE:?lane did not publish version-code}"

      - name: Release sticky-disk mounts for commit
        # Gradle/Kotlin build daemons outlive the build with /nix/store
        # jars (and ~/.gradle locks) held open, so the sticky-disk
        # post-steps' umounts get EBUSY and the disks never commit —
        # every run then starts cold. Kill remaining users of the mounts
        # EXCEPT the cachix daemon: its own post step stops it cleanly
        # (and fails the job if it is already dead) before the nix
        # sticky-disk post unmounts.
        # mountpoint guard: fuser -m on a non-mountpoint would target the
        # whole containing filesystem (/) and kill everything.
        # /usr/bin/bash, not the dev-shell bash: the latter lives in
        # /nix and would be killed mid-step.
        if: always() && startsWith(inputs.runner, 'blacksmith')
        shell: /usr/bin/bash {0}
        run: |
          targets=()
          for m in /nix /home/runner/.gradle; do
            mountpoint -q "$m" && targets+=("$m")
          done
          [ "${#targets[@]}" -gt 0 ] || exit 0
          keep="$(pgrep -f 'cachix daemon' || true)"
          for pid in $(sudo fuser -m "${targets[@]}" 2>/dev/null); do
            echo "$keep" | grep -qx "$pid" || sudo kill -9 "$pid" 2>/dev/null
          done
          sleep 2
          exit 0
