# Reusable: build convos-client prodRelease APK and upload to Firebase App
# Distribution. Runs `nix develop ./` on the CALLER's checkout — the caller's
# flake.lock pins the convos-releases fastlane package + lanes, so this file
# only pins step orchestration.
#
# This is the 3x/day dev-stream prod build: prod-flavor signing, existing
# Firebase prod app, tester group xmtp-prod-internal (fixed in the lane).
#
# Prod signing comes from the CALLER repo's `prod-signing` environment
# (declared on the job below), not from repo-level secrets — PR-triggered
# workflows can never read them, and the environment's deployment-branch
# policy restricts runs to dev. Only FIREBASE_SERVICE_ACCOUNT_JSON and
# CACHIX_AUTH_TOKEN arrive via `secrets: inherit`.
name: Android Firebase Prod (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label for the build job
        type: string
        default: warp-ubuntu-latest-x64-8x
      project-dir:
        description: Directory containing the gradle root (and fastlane/ stub)
        type: string
        default: android
      firebase-app-id:
        description: "Firebase Android app id (1:NNN:android:HEX)"
        type: string
        required: true
    secrets:
      FIREBASE_SERVICE_ACCOUNT_JSON:
        description: Base64-encoded service account JSON
        required: true
      CACHIX_AUTH_TOKEN:
        required: true

jobs:
  build:
    name: Build & upload to Firebase App Distribution
    runs-on: ${{ inputs.runner }}
    # Serialize prod-signing usage at the job itself — don't rely on every
    # caller remembering a concurrency group. Queue, never cancel.
    concurrency:
      group: firebase-prod-${{ github.repository }}
      cancel-in-progress: false
    # Resolves the prod-signing environment OF THE CALLER REPO: its secrets
    # and its deployment-branch policy (dev only) apply to this job.
    environment: prod-signing
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Set up xmtp Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: xmtp
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Enter dev shell
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "--accept-flake-config"

      - name: Decode prod keystore + Firebase service account
        env:
          PROD_KEYSTORE_B64: ${{ secrets.PROD_KEYSTORE_BASE64 }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_PASSWORD }}
          PROD_KEY_ALIAS: ${{ secrets.PROD_KEY_ALIAS }}
          PROD_KEY_PASSWORD: ${{ secrets.PROD_KEY_PASSWORD }}
          FIREBASE_SA_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        # Secret values never reach the job log: stdout is redirected into
        # the files, the shell does not echo commands, and Actions masks
        # registered secret values anyway. printf avoids echo's escape
        # processing on the base64 text.
        #
        # Guard EVERY secret, not just the decoded ones: these come from the
        # caller's prod-signing environment, and a missing/misplaced secret
        # (e.g. still repo-level, or a typo'd environment name) yields an
        # empty value that would otherwise fail minutes later with a cryptic
        # gradle signing error. An empty PROD_KEY_ALIAS would silently
        # override gradle's default alias.
        run: |
          [ -n "$PROD_KEYSTORE_B64" ] || { echo "::error::PROD_KEYSTORE_BASE64 secret is missing (check the prod-signing environment)"; exit 1; }
          [ -n "$PROD_KEYSTORE_PASSWORD" ] || { echo "::error::PROD_KEYSTORE_PASSWORD secret is missing (check the prod-signing environment)"; exit 1; }
          [ -n "$PROD_KEY_ALIAS" ] || { echo "::error::PROD_KEY_ALIAS secret is missing (check the prod-signing environment)"; exit 1; }
          [ -n "$PROD_KEY_PASSWORD" ] || { echo "::error::PROD_KEY_PASSWORD secret is missing (check the prod-signing environment)"; exit 1; }
          [ -n "$FIREBASE_SA_BASE64" ] || { echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is missing"; exit 1; }
          printf '%s' "$PROD_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/prod-upload.jks"
          printf '%s' "$FIREBASE_SA_BASE64" | base64 -d > "$RUNNER_TEMP/firebase-sa.json"

      - name: Run fastlane android prod_adhoc
        working-directory: ${{ inputs.project-dir }}
        env:
          # Absolute path: gradle's file() resolves relative paths against
          # the app module dir, not the gradle root.
          PROD_KEYSTORE_PATH: ${{ runner.temp }}/prod-upload.jks
          PROD_KEYSTORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_PASSWORD }}
          PROD_KEY_ALIAS: ${{ secrets.PROD_KEY_ALIAS }}
          PROD_KEY_PASSWORD: ${{ secrets.PROD_KEY_PASSWORD }}
          FIREBASE_APP_ID_ANDROID_PROD: ${{ inputs.firebase-app-id }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ runner.temp }}/firebase-sa.json
        run: fastlane android prod_adhoc

      - name: Clean up decoded secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/prod-upload.jks" "$RUNNER_TEMP/firebase-sa.json"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: convos-android-firebase-prod-${{ github.run_id }}
          path: ${{ inputs.project-dir }}/app/build/outputs/apk/prod/release/*.apk
          if-no-files-found: warn
          retention-days: 14
