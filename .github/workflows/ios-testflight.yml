# Reusable: build a Convos TestFlight flavor (dev or prod) and upload to
# TestFlight internal groups. Caller keeps triggers and concurrency.
# Supersedes ios-testflight-prod.yml (kept until all callers migrate).
name: iOS TestFlight (reusable)

on:
  workflow_call:
    inputs:
      flavor:
        description: "TestFlight flavor: dev or prod"
        type: string
        required: true
      runner:
        type: string
        default: warp-macos-latest-arm64-12x
      xcode-app-path:
        type: string
        required: true
      xcode-nix-path:
        type: string
        required: true
    secrets:
      CONVOS_CERTIFICATES_TOKEN:
        required: true
      MATCH_PASSWORD:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true
      CACHIX_AUTH_TOKEN:
        required: true
      POSTHOG_API_KEY_PROD:
        required: false
      POSTHOG_API_KEY_DEV:
        required: false
      SENTRY_DSN_PROD:
        required: false
      SENTRY_DSN_DEV:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false
      # Only used on the prod flavor's RC-recording path (release/hotfix
      # branches); resolved via the caller's `secrets: inherit`.
      RELEASES_BOT_APP_ID:
        required: false
      RELEASES_BOT_PRIVATE_KEY:
        required: false

jobs:
  testflight:
    name: Build & upload to TestFlight (${{ inputs.flavor }})
    runs-on: ${{ inputs.runner }}
    # Serialize TestFlight mutations per caller repo and flavor. Prod keeps
    # the legacy group name because the appstore-promote workflow shares it;
    # dev ships to a different ASC app, so it gets its own queue. Queue,
    # never cancel (callers may add a cancelling group of their own).
    concurrency:
      group: testflight-${{ github.repository }}${{ inputs.flavor == 'dev' && '-dev' || '' }}
      cancel-in-progress: false
    # Resolves the CALLER's testflight environment: ASC secrets live here (off
    # repo-level) so PR-triggered workflows can't read them, and its
    # deployment-branch policy restricts runs to dev/release/*/hotfix/*/main.
    environment: testflight
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
    env:
      XCODE_NIX_PATH: ${{ inputs.xcode-nix-path }}
    steps:
      - name: Validate flavor
        env:
          FLAVOR: ${{ inputs.flavor }}
        run: |
          case "$FLAVOR" in
            dev|prod) ;;
            *) echo "Unknown flavor: $FLAVOR (expected dev or prod)" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v6
        with:
          # git rev-list --count HEAD needs full history.
          fetch-depth: 0

      - name: Checkout convos-certificates (match repo)
        uses: actions/checkout@v6
        with:
          repository: xmtplabs/convos-certificates
          token: ${{ secrets.CONVOS_CERTIFICATES_TOKEN }}
          path: convos-certificates
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Pin Xcode into /nix/store
        uses: xmtplabs/xmtp-cache-apple@v1
        with:
          xcode-path: ${{ inputs.xcode-app-path }}
          xcode-nix-path: ${{ inputs.xcode-nix-path }}

      - name: Set up xmtp Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: xmtp
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Snapshot pre-build store paths
        run: nix path-info --all | sort > /tmp/store-paths-before

      - name: Enter dev shell
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "--accept-flake-config --impure"

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Generate Secrets.swift
        env:
          # generate-secrets-secure.sh selects the matching Sentry DSN from
          # the configuration, so both DSN secrets are passed through. The
          # PostHog key is selected here the same way - a GH-expression
          # ternary would fall through to the prod key when the dev secret
          # is unset, which must never happen silently.
          BUILD_CONFIGURATION: ${{ inputs.flavor == 'dev' && 'Dev' || 'Prod' }}
          POSTHOG_API_KEY_DEV: ${{ secrets.POSTHOG_API_KEY_DEV }}
          POSTHOG_API_KEY_PROD: ${{ secrets.POSTHOG_API_KEY_PROD }}
          SENTRY_DSN_DEV: ${{ secrets.SENTRY_DSN_DEV }}
          SENTRY_DSN_PROD: ${{ secrets.SENTRY_DSN_PROD }}
        run: |
          if [ "$BUILD_CONFIGURATION" = "Dev" ]; then
            export POSTHOG_API_KEY="$POSTHOG_API_KEY_DEV"
          else
            export POSTHOG_API_KEY="$POSTHOG_API_KEY_PROD"
          fi
          ./Scripts/generate-secrets-secure.sh

      - name: Run fastlane testflight_${{ inputs.flavor }}
        id: fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ github.workspace }}/convos-certificates
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          # Passed directly to fastlane's app_store_connect_api_key via key_content;
          # stays in memory, never written to disk, redacted from logs.
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          FLAVOR: ${{ inputs.flavor }}
        run: fastlane "testflight_${FLAVOR}"

      # Uploads the archive's dSYMs for server-side symbolication. Skips
      # cleanly when the Sentry secrets aren't configured (and for dev, where
      # DEBUG_INFORMATION_FORMAT=dwarf produces no dSYM zip).
      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set - skipping dSYM upload."
            exit 0
          fi
          shopt -s nullglob
          dsym_zips=(build/*.dSYM.zip)
          if [ ${#dsym_zips[@]} -eq 0 ]; then
            echo "No dSYM zips found in build/ - nothing to upload."
            exit 0
          fi
          sentry-cli debug-files upload "${dsym_zips[@]}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Convos-${{ inputs.flavor == 'dev' && 'Dev' || 'Prod' }}-TestFlight-${{ github.run_id }}
          path: build/Convos-${{ inputs.flavor == 'dev' && 'Dev' || 'Prod' }}-TestFlight.ipa
          if-no-files-found: warn
          retention-days: 14

      # Record this RC (prod flavor, release/hotfix branches only). The
      # always() + fastlane.outcome guards record even if a later step fails,
      # but never if the upload didn't.
      - name: Record RC in train manifest
        if: always() && steps.fastlane.outcome == 'success' && inputs.flavor == 'prod' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))
        uses: actions/create-github-app-token@v1
        id: bot
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases
      - name: Append manifest entry
        if: always() && steps.fastlane.outcome == 'success' && inputs.flavor == 'prod' && (startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/'))
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          BUILD_NUMBER: ${{ steps.fastlane.outputs.build-number }}
        run: |
          nix run github:xmtplabs/convos-releases#train --option access-tokens "github.com=$GH_TOKEN" -- append-rc \
            --repo "$GITHUB_REPOSITORY" --sha "$GITHUB_SHA" \
            --run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --key build-number --value "${BUILD_NUMBER:?lane did not publish build-number}"

      - name: Push new paths to xmtp Cachix
        if: success()
        run: |
          set -e
          new_paths=$(comm -13 \
            /tmp/store-paths-before \
            <(nix path-info --all | sort))
          if [ -z "$new_paths" ]; then
            echo "No new paths to push."
            exit 0
          fi
          tainted=$(nix-store --query --referrers-closure "$XCODE_NIX_PATH" | sort -u)
          to_push=$(comm -23 <(echo "$new_paths" | sort -u) <(echo "$tainted"))
          if [ -z "$to_push" ]; then
            echo "Nothing to push after filtering."
            exit 0
          fi
          echo "Pushing $(echo "$to_push" | wc -l | tr -d ' ') paths to xmtp cache"
          echo "$to_push" | xargs cachix push xmtp
