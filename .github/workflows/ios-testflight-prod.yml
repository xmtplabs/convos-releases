# Reusable: build Convos (Prod) and upload to TestFlight internal groups.
# Lifted from convos-ios's testflight-prod.yml job; caller keeps triggers
# and concurrency.
name: iOS TestFlight Prod (reusable)

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: warp-macos-latest-arm64-12x
      xcode-app-path:
        type: string
        required: true
      xcode-nix-path:
        type: string
        required: true
    secrets:
      CONVOS_CERTIFICATES_TOKEN:
        required: true
      MATCH_PASSWORD:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true
      CACHIX_AUTH_TOKEN:
        required: true
      POSTHOG_API_KEY_PROD:
        required: false
      SENTRY_DSN_PROD:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false

jobs:
  testflight_prod:
    name: Build & upload to TestFlight (Prod)
    runs-on: ${{ inputs.runner }}
    # Serialize TestFlight mutations per caller repo (RC uploads now; Phase-2
    # promotion joins the same group). Queue, never cancel.
    concurrency:
      group: testflight-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
    env:
      XCODE_NIX_PATH: ${{ inputs.xcode-nix-path }}
    steps:
      - uses: actions/checkout@v6
        with:
          # latest_testflight_build_number doesn't need history, but
          # git rev-list --count HEAD does; the deeper of the two wins.
          fetch-depth: 0

      - name: Checkout convos-certificates (match repo)
        uses: actions/checkout@v6
        with:
          repository: xmtplabs/convos-certificates
          token: ${{ secrets.CONVOS_CERTIFICATES_TOKEN }}
          path: convos-certificates
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Pin Xcode into /nix/store
        uses: xmtplabs/xmtp-cache-apple@v1
        with:
          xcode-path: ${{ inputs.xcode-app-path }}
          xcode-nix-path: ${{ inputs.xcode-nix-path }}

      - name: Set up xmtp Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: xmtp
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Snapshot pre-build store paths
        run: nix path-info --all | sort > /tmp/store-paths-before

      - name: Enter dev shell
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "--accept-flake-config --impure"

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Generate Secrets.swift
        env:
          BUILD_CONFIGURATION: Prod
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY_PROD }}
          SENTRY_DSN_PROD: ${{ secrets.SENTRY_DSN_PROD }}
        run: ./Scripts/generate-secrets-secure.sh

      - name: Run fastlane testflight_prod
        id: fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ github.workspace }}/convos-certificates
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          # Passed directly to fastlane's app_store_connect_api_key via key_content;
          # stays in memory, never written to disk, redacted from logs.
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: fastlane testflight_prod

      # Sentry symbolicates prod crash reports server-side using the dSYMs
      # from the archive (gym zips them next to the IPA). Skips cleanly when
      # the Sentry secrets are not configured.
      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set - skipping dSYM upload."
            exit 0
          fi
          shopt -s nullglob
          dsym_zips=(build/*.dSYM.zip)
          if [ ${#dsym_zips[@]} -eq 0 ]; then
            echo "No dSYM zips found in build/ - nothing to upload."
            exit 0
          fi
          sentry-cli debug-files upload "${dsym_zips[@]}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Convos-Prod-TestFlight-${{ github.run_id }}
          path: build/Convos-Prod-TestFlight.ipa
          if-no-files-found: warn
          retention-days: 14

      # Record this RC in the train manifest (release/hotfix branches only).
      - name: Record RC in train manifest
        if: startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/')
        uses: actions/create-github-app-token@v1
        id: bot
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases
      - name: Append manifest entry
        if: startsWith(github.ref_name, 'release/') || startsWith(github.ref_name, 'hotfix/')
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          BUILD_NUMBER: ${{ steps.fastlane.outputs.build-number }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#*/}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          for attempt in 1 2 3; do
            rm -rf /tmp/train && git clone --quiet --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/xmtplabs/convos-releases.git" /tmp/train
            f="/tmp/train/releases/$version/manifest.yml"
            [ -f "$f" ] || { echo "::error::no manifest for $version — was this branch cut by the train?"; exit 1; }
            PATH="$(nix build nixpkgs#yq-go --no-link --print-out-paths)/bin:$PATH" \
              /tmp/train/scripts/manifest.sh append-rc "$f" "${{ github.repository }}" \
              "${{ github.sha }}" "$run_url" build-number "${BUILD_NUMBER:?lane did not publish build-number}"
            git -C /tmp/train -c user.name=convos-releases-bot -c user.email="convos-releases-bot[bot]@users.noreply.github.com" \
              commit -am "train: rc ${{ github.repository }}@${GITHUB_SHA:0:7} for $version" || exit 0
            git -C /tmp/train push origin HEAD:main && break
            echo "push race, retry $attempt"; sleep $((attempt * 3))
          done

      - name: Push new paths to xmtp Cachix
        if: success()
        run: |
          set -e
          new_paths=$(comm -13 \
            /tmp/store-paths-before \
            <(nix path-info --all | sort))
          if [ -z "$new_paths" ]; then
            echo "No new paths to push."
            exit 0
          fi
          tainted=$(nix-store --query --referrers-closure "$XCODE_NIX_PATH" | sort -u)
          to_push=$(comm -23 <(echo "$new_paths" | sort -u) <(echo "$tainted"))
          if [ -z "$to_push" ]; then
            echo "Nothing to push after filtering."
            exit 0
          fi
          echo "Pushing $(echo "$to_push" | wc -l | tr -d ' ') paths to xmtp cache"
          echo "$to_push" | xargs cachix push xmtp
