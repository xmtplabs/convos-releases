# Reusable: merge the open release (or hotfix) PR for `version` on both app
# repos, on behalf of `actor`. The caller resolves `actor` and passes it
# through so Train::Merge can re-verify write access before merging. All
# merge logic lives in the tested `train` CLI; this only plumbs credentials.
name: Train Merge (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: Release (or hotfix) version (X.Y.Z) to merge
        type: string
        required: true
      actor:
        description: GitHub login requesting the merge (permission-gated)
        type: string
        required: true
      requested-by:
        description: "Operator identity (email/login) requesting the merge — log-only attribution"
        type: string
        default: ""
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
      RELEASES_BOT_APP_ID:
        required: true
      RELEASES_BOT_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Release (or hotfix) version (X.Y.Z) to merge
        type: string
        required: true
      actor:
        description: Dispatcher login — must equal github.actor (the dashboard's actor bot on the dashboard path); asserts channel provenance, not permission
        type: string
        required: true
      requested-by:
        description: "Operator identity (email/login) requesting the merge — log-only attribution"
        type: string
        default: ""

jobs:
  merge:
    name: Merge release PRs
    runs-on: blacksmith-8vcpu-ubuntu-2404
    # Serializes repeat comments on the same repo's PR. Groups don't span
    # repos, so two repos' PRs run concurrently — Train::Merge tolerates that
    # race (the loser converges to "already merged").
    concurrency:
      group: train-merge-${{ inputs.version }}
      cancel-in-progress: false
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # On workflow_dispatch, github.actor is whoever authenticated the
      # dispatch. When the release dashboard dispatches via its actor app,
      # that's release-control-dashboard[bot] (the app's slug + [bot]; the app
      # is *named* convos-dashboard-actor but its slug differs) — so
      # inputs.actor == github.actor asserts the dispatch genuinely came through
      # the dashboard's actor app (channel provenance), not that a human proved
      # their identity. Train::Merge additionally requires that actor to equal
      # the bot before it skips the per-repo write gate. workflow_call callers
      # (conductor-merge.yml) pass the authenticated commenter and never run
      # this step.
      - name: Verify dispatch actor
        if: github.event_name == 'workflow_dispatch'
        env:
          CLAIMED: ${{ inputs.actor }}
          REAL: ${{ github.actor }}
        run: |
          if [ "$CLAIMED" != "$REAL" ]; then
            echo "::error::workflow_dispatch actor '$CLAIMED' does not match the authenticated dispatcher '$REAL'"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          # No pushes here (the merge is an API call), but persist-credentials:
          # false anyway, matching every other reusable workflow.
          persist-credentials: false

      - name: Set up Nix
        # Qualified ref: this reusable workflow checks out the CALLER's
        # repo, so a ./ action path would not resolve.
        uses: xmtplabs/convos-releases/.github/actions/setup-nix@main
        with:
          sticky-disk: "true"
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Enter dev shell
        uses: nicknovitski/nix-develop@v1
        with:
          arguments: "--accept-flake-config"

      - name: Mint bot token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASES_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASES_BOT_PRIVATE_KEY }}
          owner: xmtplabs
          repositories: convos-releases,convos-ios,convos-client

      - name: train merge
        # Inputs flow through env vars, not inline ${{ }} — version and actor
        # are externally influenced; interpolating them into the script would
        # allow shell injection with the bot token in scope.
        env:
          GH_TOKEN: ${{ steps.bot.outputs.token }}
          TRAIN_VERSION: ${{ inputs.version }}
          TRAIN_ACTOR: ${{ inputs.actor }}
          TRAIN_REQUESTED_BY: ${{ inputs.requested-by || '' }}
          TRAIN_EVENT_NAME: ${{ github.event_name }}
        run: |
          train merge --version "$TRAIN_VERSION" --actor "$TRAIN_ACTOR" \
            --requested-by "$TRAIN_REQUESTED_BY" --event-name "$TRAIN_EVENT_NAME"
