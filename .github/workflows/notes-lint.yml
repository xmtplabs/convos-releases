# Required check for auto-merged notes PRs (ConvosOS drafts). Runs on EVERY
# PR to main and no-ops fast when no releases/ files changed — a required
# check gated by `on.paths` would never report and wedge unrelated PRs.
name: Notes Lint

on:
  pull_request:
    branches: [main]

concurrency:
  group: notes-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notes-lint:
    runs-on: warp-ubuntu-latest-x64-8x
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Changed release versions
        id: changed
        run: |
          versions=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- 'releases/' \
            | cut -d/ -f2 | sort -u | tr '\n' ' ')
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "Changed versions: ${versions:-none}"

      - name: Install Nix
        if: steps.changed.outputs.versions != ''
        uses: nixbuild/nix-quick-install-action@v33
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Lint
        if: steps.changed.outputs.versions != ''
        env:
          VERSIONS: ${{ steps.changed.outputs.versions }}
        run: |
          for v in $VERSIONS; do
            nix develop --command train notes-lint --version "$v"
          done
